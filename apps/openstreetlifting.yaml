apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstreetlifting
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://github.com/openstreetlifting/openstreetlifting.git
      targetRevision: main
      path: charts/
      helm:
        valueFiles:
          - values.yaml
          - $values/helm/openstreetlifting/values-prod.yaml
    - repoURL: https://github.com/dirdr/adrien_kubernetes_cluster.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: osl
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
