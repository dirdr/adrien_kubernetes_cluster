deploymentMode: SingleBinary
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      memory: 128Mi
    limits:
      memory: 256Mi
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0
lokiCanary:
  enabled: false
gateway:
  enabled: false
test:
  enabled: false
chunksCache:
  resources:
    requests:
      memory: 64Mi
    limits:
      memory: 128Mi
resultsCache:
  resources:
    requests:
      memory: 32Mi
    limits:
      memory: 64Mi
