configs:
  params:
    server.insecure: true

server:
  ingress:
    enabled: true
    ingressClassName: traefik
    hostname: argocd.adrienpelfresne.com
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    tls: false

notifications:
  enabled: false

controller:
  resources:
    requests:
      memory: 256Mi
    limits:
      memory: 768Mi

server:
  resources:
    requests:
      memory: 64Mi
    limits:
      memory: 256Mi

repoServer:
  resources:
    requests:
      memory: 64Mi
    limits:
      memory: 256Mi
