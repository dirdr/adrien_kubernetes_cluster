replicaCount: 1

image:
  repository: ghcr.io/dirdr/utazon-backend
  tag: "sha-fa01e25"
  pullPolicy: Always

service:
  port: 3001

ingress:
  host: api.utazon.fr
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt

secretName: utazon-backend-secrets

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 65534
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

env:
  RUST_LOG: "utazon_backend=info,tower_http=info,tower=warn"
  ALLOWED_ORIGINS: "https://utazon.fr,*.pages.dev"
